<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
</head>
<body>
<h2>Giỏ hàng</h2>
<table border="1" cellpadding="8" cellspacing="0">
    <thead>
        <tr>
            <th>STT</th>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>1</td>
            <td>iPhone 16</td>
            <td>20.000.000</td>
            <td>1</td>
            <td>20.000.000</td>
        </tr>
        <tr>
            <td>2</td>
            <td>AirPods Pro</td>
            <td>5.000.000</td>
            <td>2</td>
            <td>10.000.000</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Sạc nhanh</td>
            <td>500.000</td>
            <td>1</td>
            <td>500.000</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="4"><strong>Tổng cộng</strong></td>
            <td><strong>30.500.000</strong></td>
        </tr>
    </tfoot>
</table>

<br>

<form action="#" method="POST">

    <!-- Thanh toán -->
    <fieldset>
        <legend>Thanh toán</legend>

        <p>Phương thức thanh toán:</p>

        <label>
            <input type="radio" name="payment" value="cod" required>
            COD
        </label>

        <label>
            <input type="radio" name="payment" value="bank">
            Chuyển khoản
        </label>

        <label>
            <input type="radio" name="payment" value="ewallet">
            Ví điện tử
        </label>

        <br><br>

        <label for="coupon">Mã giảm giá:</label><br>
        <input type="text" id="coupon" name="coupon"
               pattern="SALE[0-9]{4}"
               placeholder="VD: SALE2026">

        <br><br>

        <!-- Ghi chú -->
        <label for="note">Ghi chú:</label><br>
        <textarea id="note" name="note"
                  rows="3"
                  placeholder="Nhập ghi chú (nếu có)"></textarea>
    </fieldset>

    <br>

    <!-- Giao hàng -->
    <fieldset>
        <legend>Thông tin giao hàng</legend>

        <!-- Ngày giao -->
        <label for="delivery_date">Ngày giao hàng:</label><br>
        <input type="date" id="delivery_date" name="delivery_date" required>

        <br><br>

        <!-- Khung giờ -->
        <label for="time_slot">Khung giờ:</label><br>
        <select id="time_slot" name="time_slot" required>
            <option value="">Chọn khung giờ</option>
            <option>Sáng (8-12h)</option>
            <option>Chiều (14-18h)</option>
            <option>Tối (18-21h)</option>
        </select>

        <br><br>
        <!-- Range -->
        <label for="days">Thời gian giao hàng (ngày):</label><br>
        <input type="range" id="days" name="days"
               min="1" max="7" step="1"
               oninput="output.value = days.value">
        <output id="output">1</output> ngày
    </fieldset>

    <br>

    <!-- Submit -->
    <button type="submit" aria-label="Xác nhận đặt hàng">
        Đặt hàng
    </button>

</form>
</body>
</html>
